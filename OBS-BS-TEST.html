<!DOCTYPE html>
<html>
<head>
    <style>
        /* SIZING: Keeps the player responsive to your OBS Dock dimensions */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: black; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <script>
        // ==========================================
        // CHANGE YOUR PLAYLIST ID HERE (34 characters)
        // ==========================================
        const PLAYLIST_ID = "PLw2gyMFmq40pL-jC1jFPreWHGuV7g_Kmu"; 

        function loadVideo() {
            const iframe = document.getElementById("yt-player");
            if (iframe) {
                /* FIXES FOR ERROR 153:
                  1. Changed domain to www.youtube-nocookie.com
                  2. Kept the origin parameter set to localhost
                */
                iframe.src = `https://www.youtube-nocookie.com/embed/videoseries?list=${PLAYLIST_ID}&autoplay=1&mute=1&controls=1&loop=1&origin=https://localhost`;
            }
        }

        // Loop to inject the link immediately upon DOM readiness
        const checkExist = setInterval(function() {
            if (document.getElementById("yt-player")) {
                loadVideo();
                clearInterval(checkExist);
            }
        }, 50);
    </script>

    <iframe id="yt-player"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
    </iframe>

</body>
</html>

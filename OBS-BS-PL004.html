<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: black; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <iframe id="yt-player"
            src="https://www.youtube.com/embed/videoseries?list=PLgtcbJWEssU-P7bVcqtujNTHpoEaWPy92&autoplay=1&mute=1&controls=1&loop=1&modestbranding=1&rel=0&iv_load_policy=3"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
    </iframe>

</body>
</html>
